<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好友圈登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .text-gradient {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-blue {
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 12px 20px;
            border-radius: 0.5rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-blue:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white/80 backdrop-blur-lg rounded-2xl shadow-xl p-8 glass-effect">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gradient mb-2">好友圈</h1>
            <p class="text-gray-600">请输入您的临时密钥登录</p>
        </div>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label for="key" class="block text-sm font-medium text-gray-700 mb-1">临时密钥</label>
                <input type="text" id="key" name="key" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    placeholder="请输入临时密钥">
            </div>
            
            <button type="submit"
                class="w-full btn-blue">
                登录好友圈
            </button>
        </form>
        
        <div id="message" class="mt-4 hidden p-3 rounded-lg"></div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>私聊机器人获取临时密钥</p>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const key = document.getElementById('key').value;
            const messageEl = document.getElementById('message');

            if (!key) {
                showMessage('请输入临时密钥', 'error');
                return;
            }
            
            try {
                window.location.href = `/moments?key=${encodeURIComponent(key)}`;
            } catch (error) {
                showMessage('登录请求失败，请稍后重试', 'error');
            }
        });
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'mt-4 p-3 rounded-lg ' + 
                (type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700');
            messageEl.classList.remove('hidden');
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
